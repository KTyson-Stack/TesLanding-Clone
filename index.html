<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Tesla</title>
    </head>

    <body>
        
        <header>
            
            <section>
                <img src="images/logo.svg" class="logo" alt="Tesla Logo">
            </section>

            <section class="menu">
                <a href="#">Vehicles</a>
                <a href="#">Energy</a>
                <a href="#">Charging</a>
                <a href="#">Discover</a>
                <a href="#">Shop</a>
            </section>

            <section class="options">
                <img src="images/help.svg" class="action-icons" alt="Help Icon">
                <img src="images/language.svg" class="action-icons" alt="Language Icon">
                <img src="images/account.svg" class="action-icons" alt="Account Icon">
            </section>

        </header>

        <main>

            <section class="hero-banner">
                <h1 class="main-heading">Model 3</h1>
                <h4 class="sub-heading">One Year of Free Supercharging Ends June 15</h4>

                <section class="buttons">
                    <button class="primary">Order Now</button>
                    <button class="secondary">Learn More</button>
                </section>
            </section>

            <section class="cards">

                    <div class="model model-s">
                         <h1 class="main-heading">Model S</h1>
                    </div>

                     <div class="model model-3">
                         <h1 class="main-heading">Model 3</h1>
                     </div>

                     <div class="model model-x">
                         <h1 class="main-heading">Model X</h1>
                    </div>

                     <div class="model model-y">
                        <h1 class="main-heading">Model Y</h1>
                    </div>

            </section>

            <section class="mini-cards"></section>
            <section class="find-your-charge"></section>
            <section class="extra-cards"></section>

        </main>

        <footer>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </footer>
        
    </body>
</html>
